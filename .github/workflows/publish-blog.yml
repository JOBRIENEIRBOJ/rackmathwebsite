name: Publish scheduled blog posts

on:
  schedule:
    - cron: "15 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install blog generator dependencies
        run: npm install

      - name: Generate next blog draft
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: node scripts/generate-rackmath-blog.js

      - name: Build published blog posts
        run: python3 tools/build_blog.py

      - name: Commit generated blog updates
        run: |
          if git diff --quiet; then
            echo "No blog updates to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog-topic-queue.json content/blog blog.html blog sitemap.xml
          git commit -m "Publish scheduled blog posts"
          git push
