name: Publish scheduled blog posts

on:
  push:
    branches:
      - main
    paths:
      - "content/blog/**"
      - "content/blog-topic-queue.json"
      - "content/seo-pages.json"
      - "tools/build_site.py"
  schedule:
    - cron: "15 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build published site pages
        run: python3 tools/build_site.py

      - name: Validate published SEO pages
        run: python3 tools/check_seo.py

      - name: Commit generated blog updates
        run: |
          if git diff --quiet; then
            echo "No blog updates to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog.html blog tools/*.html tools/index.html sitemap.xml
          git commit -m "Publish scheduled blog posts"
          git push
